org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# ── Gradle Performance ─────────────────────────────────────────────────────────
# Reuse the Gradle JVM process across builds (huge speedup after first build)
org.gradle.daemon=true

# Build independent tasks in parallel
org.gradle.parallel=true

# Cache task outputs — skip tasks whose inputs haven't changed
org.gradle.caching=true

# Skip re-configuring tasks that haven't changed (disabled as it causes incompatibility with some Flutter/Kotlin Gradle plugins)
org.gradle.configuration-cache=false

# Android-specific
android.enableR8.fullMode=false
android.defaults.buildfeatures.buildconfig=true
